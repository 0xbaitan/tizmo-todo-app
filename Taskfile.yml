version: '3'

tasks:
  welcome:
    desc: Print a welcome message
    cmds:
      - echo "Welcome to Tizmo! This is your Taskfile. You can define your tasks here."
    silent: true

  install-terraform:
    desc: Install terraform
    cmds:
      - ./scripts/terraform.sh install

  uninstall-terraform:
    desc: Uninstall terraform
    cmds:
      - ./scripts/terraform.sh uninstall

  verify-terraform:
    desc: Verify terraform installation
    cmds:
      - ./scripts/terraform.sh verify

  upgrade-terraform:
    desc: Upgrade terraform to latest version
    cmds:
      - ./scripts/terraform.sh upgrade
